<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Оптовый каталог</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0d0f14;--surface:#161a22;--surface2:#1e2530;--border:#2a3140;--accent:#f0a500;--text:#f0f4ff;--text2:#8a96a8;--green:#22c55e;--red:#ef4444;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;overscroll-behavior:none}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:15px;font-weight:700;color:var(--accent)}
.cart-btn{background:var(--accent);color:#000;border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.cart-count{background:#000;color:var(--accent);border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700}
.search-wrap{position:relative}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-size:13px;outline:none}
.search-input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px}

.subscribe-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(90deg,#1e2a1e 0%,#16321e 100%);border:1px solid #2e5a3a;border-radius:12px;padding:10px 14px;margin:10px 16px 0}
.subscribe-text{font-size:12px;line-height:1.4}
.subscribe-text b{color:#7ee787}
.subscribe-btn{background:var(--green);color:#fff;border:none;border-radius:18px;padding:7px 14px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;text-decoration:none;display:inline-block}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

.cats{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);white-space:nowrap;cursor:pointer;flex-shrink:0}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.products{padding:4px 12px 100px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;transition:transform .1s}
.card:active{transform:scale(.97)}
.card-img{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
.card-img .icon-fallback{position:relative;z-index:1}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-badge{position:absolute;top:8px;left:8px;z-index:2;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;color:#fff;display:flex;align-items:center;gap:3px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.card-body{padding:8px 10px 10px}
.card-name{font-size:11px;font-weight:600;line-height:1.4;margin-bottom:4px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-spec{font-size:10px;color:var(--text2);margin-bottom:6px}
.card-price{font-size:15px;font-weight:700;color:var(--accent)}
.card-price span{font-size:10px;color:var(--text2);font-weight:400}
.card-qty{font-size:10px;margin-top:1px;display:flex;align-items:center;gap:4px}
.stock-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.add-btn{position:absolute;bottom:8px;right:8px;background:var(--accent);border:none;border-radius:8px;width:26px;height:26px;font-size:16px;color:#000;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.add-btn:active{transform:scale(0.85)}
.in-cart-badge{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;z-index:2}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.close-btn{position:absolute;top:16px;right:16px;background:var(--surface2);border:none;border-radius:20px;width:28px;height:28px;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-img{width:100%;height:200px;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:72px;margin-bottom:16px;position:relative}
.detail-name{font-size:16px;font-weight:700;margin-bottom:4px}
.detail-id{font-size:11px;color:var(--text2);margin-bottom:12px}
.spec-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.spec-row:last-of-type{border-bottom:none}
.spec-label{color:var(--text2)}
.price-big{font-size:28px;font-weight:800;color:var(--accent);margin:12px 0 4px}
.qty-control{display:flex;align-items:center;gap:12px;margin:12px 0}
.qty-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:20px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:64px;height:36px;text-align:center;color:var(--text);font-size:16px;font-weight:600;outline:none}
.primary-btn{width:100%;background:var(--accent);border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;color:#000;cursor:pointer;margin-top:4px}
.cart-title{font-size:18px;font-weight:700;margin-bottom:16px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:11px;color:var(--text2);margin-top:2px}
.ci-total{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap}
.ci-remove{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px}
.ci-qty{display:flex;align-items:center;gap:6px}
.ci-qty-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.ci-qty-num{font-size:14px;font-weight:600;min-width:24px;text-align:center}
.cart-summary{padding:16px 0}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:16px}
.cart-total span{color:var(--accent);font-size:20px}
.cart-empty{text-align:center;padding:40px 0;color:var(--text2)}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.form-input:focus{border-color:var(--accent)}
.success-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:40px 20px;width:100%;text-align:center}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-size:20px;font-weight:700;margin-bottom:8px}
.success-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px}
.lang-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text2);font-size:11px;cursor:pointer}
.lang-btn.active{border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:60px 20px;color:var(--text2);grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo" id="logo-text">🛍 Оптовый каталог</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="lang-btn active" id="lang-ru" onclick="setLang('ru')">РУС</button>
      <button class="lang-btn" id="lang-tj" onclick="setLang('tj')">ТОҶ</button>
      <button class="cart-btn" onclick="openCart()">🛒 <span id="cart-label">Корзина</span> <span class="cart-count" id="cart-count">0</span></button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Поиск товара..." oninput="renderProducts()" autocomplete="off">
  </div>
</div>

<div class="subscribe-banner">
  <div class="subscribe-text"><span class="live-dot"></span><b id="sub-title">Новинки и акции</b><br><span id="sub-sub">Подпишись на канал с новыми товарами</span></div>
  <a class="subscribe-btn" id="sub-btn" href="https://t.me/otomdeshevle_news" target="_blank">📢 Подписаться</a>
</div>

<div class="cats" id="cats"></div>
<div class="products" id="products"></div>

<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="sheet" style="position:relative" id="detail-sheet">
    <div class="handle"></div>
    <button class="close-btn" onclick="closeDetailBtn()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>
<div class="overlay" id="cart-overlay" onclick="closeCart(event)">
  <div class="sheet" style="position:relative">
    <div class="handle"></div>
    <button class="close-btn" onclick="closeCartBtn()">✕</button>
    <div class="cart-title" id="cart-title-text">🛒 Корзина</div>
    <div id="cart-content"></div>
  </div>
</div>
<div class="overlay" id="form-overlay" onclick="closeForm(event)">
  <div class="sheet" style="position:relative">
    <div class="handle"></div>
    <button class="close-btn" onclick="closeFormBtn()">✕</button>
    <div class="cart-title" id="form-title-text">📋 Оформить заказ</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px" id="form-sub-text">Заполните данные — мы свяжемся с вами</p>
    <label class="form-label">Ваше имя / Магазин</label>
    <input class="form-input" id="buyer-name" placeholder="Имя или название магазина">
    <label class="form-label">Телефон / WhatsApp</label>
    <input class="form-input" id="buyer-phone" placeholder="+992..." type="tel">
    <label class="form-label">Комментарий (необязательно)</label>
    <input class="form-input" id="buyer-comment" placeholder="Уточнения к заказу">
    <button class="primary-btn" onclick="submitOrder()">✅ Отправить заказ</button>
  </div>
</div>
<div class="overlay" id="success-overlay">
  <div class="success-sheet">
    <div class="success-icon">✅</div>
    <div class="success-title" id="success-title">Заказ отправлен!</div>
    <div class="success-sub" id="success-sub">Мы получили ваш заказ и свяжемся с вами в ближайшее время.</div>
    <button class="primary-btn" style="width:auto;padding:12px 32px" onclick="closeSuccess()">Закрыть</button>
  </div>
</div>

  const s=getCatStyle(p.cat);
  if(p.img){
    return `<div class="detail-img" style="background:${s.color}"><img src="${p.img}" style="width:100%;height:100%;object-fit:cover;position:absolute" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;position:absolute"><span style="font-size:72px">${s.icon}</span></div></div>`;
  }
  return `<div class="detail-img" style="background:linear-gradient(135deg,${s.color} 0%,${s.color}cc 100%)"><span style="font-size:72px">${s.icon}</span></div>`;
}
function stockColor(qty){
  if(qty>=200) return 'var(--green)';
  if(qty>=50) return '#f0a500';
  return 'var(--red)';
}

function renderCats(){
  const cats=[...new Set(PRODUCTS.map(p=>p.cat))].sort();
  const el=document.getElementById('cats');
  el.innerHTML=`<button class="cat-btn ${activeCat==='all'?'active':''}" onclick="selectCat('all')">${t('all')} (${PRODUCTS.length})</button>`+cats.map(c=>{const n=PRODUCTS.filter(p=>p.cat===c).length;const s=getCatStyle(c);return`<button class="cat-btn ${activeCat===c?'active':''}" onclick="selectCat('${c}')">${s.icon} ${c} (${n})</button>`}).join('');
}

function selectCat(c){activeCat=c;renderCats();renderProducts()}

function renderProducts(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const filtered=PRODUCTS.filter(p=>{const mc=activeCat==='all'||p.cat===activeCat;const mq=!q||p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);return mc&&mq});
  const el=document.getElementById('products');
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div>Ничего не найдено</div></div>`;return}
  el.innerHTML=filtered.map(p=>{const ic=cart[p.id]?cart[p.id].qty:0;return`<div class="card" onclick="openDetail('${p.id}')">${ic?`<div class="in-cart-badge">${ic}</div>`:''}`+cardImg(p)+`<div class="card-body"><div class="card-name">${p.name}</div>${p.spec?`<div class="card-spec">${p.spec}</div>`:''}<div class="card-price">${fmtPrice(p.price)} <span>${t('somoni')}</span></div><div class="card-qty"><span class="stock-dot" style="background:${stockColor(p.qty)}"></span>${t('stock')} ${p.qty} ${t('pcs')}</div></div><button class="add-btn" onclick="quickAdd(event,'${p.id}')">+</button></div>`}).join('');
}

function quickAdd(e,id){e.stopPropagation();const p=PRODUCTS.find(x=>x.id===id);if(!cart[id])cart[id]={product:p,qty:0};cart[id].qty++;updateCartCount();renderProducts();if(window.Telegram&&Telegram.WebApp)Telegram.WebApp.HapticFeedback.impactOccurred('light')}

function openDetail(id){
  const p=PRODUCTS.find(x=>x.id===id);detailId=id;detailQty=cart[id]?cart[id].qty:1;
  document.getElementById('detail-content').innerHTML=detailImg(p)+`<div class="detail-name">${p.name}</div><div class="detail-id">Арт. ${p.id}</div><div class="spec-row"><span class="spec-label">Цена</span><span style="color:var(--accent);font-weight:700">${fmtPrice(p.price)} ${t('somoni')}</span></div>${p.spec?`<div class="spec-row"><span class="spec-label">Упаковка</span><span>${p.spec}</span></div>`:''}<div class="spec-row"><span class="spec-label">${t('stock')}</span><span>${p.qty} ${t('pcs')}</span></div><div class="price-big">${fmtPrice(p.price)} <span style="font-size:16px;color:var(--text2);font-weight:400">${t('somoni')}</span></div><div class="qty-control"><button class="qty-btn" onclick="chQty(-1)">−</button><input class="qty-input" id="dqi" type="number" value="${detailQty}" min="1" oninput="dqInput(this.value)"><button class="qty-btn" onclick="chQty(1)">+</button><span id="dqtotal" style="color:var(--text2);font-size:12px">= ${fmtPrice(p.price*detailQty)} ${t('somoni')}</span></div><button class="primary-btn" onclick="addFromDetail()">${t('add')}</button>`;
  document.getElementById('detail-overlay').classList.add('open');
}
function chQty(d){detailQty=Math.max(1,detailQty+d);document.getElementById('dqi').value=detailQty;refreshTotal()}
function dqInput(v){detailQty=Math.max(1,parseInt(v)||1);refreshTotal()}
function refreshTotal(){const p=PRODUCTS.find(x=>x.id===detailId);document.getElementById('dqtotal').textContent=`= ${fmtPrice(p.price*detailQty)} ${t('somoni')}`}
function addFromDetail(){const p=PRODUCTS.find(x=>x.id===detailId);cart[detailId]={product:p,qty:detailQty};updateCartCount();renderProducts();closeDetailBtn();if(window.Telegram&&Telegram.WebApp)Telegram.WebApp.HapticFeedback.notificationOccurred('success')}
function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))closeDetailBtn()}
function closeDetailBtn(){document.getElementById('detail-overlay').classList.remove('open')}

function updateCartCount(){document.getElementById('cart-count').textContent=Object.values(cart).reduce((s,x)=>s+x.qty,0)}

function openCart(){renderCart();document.getElementById('cart-overlay').classList.add('open')}
function closeCart(e){if(e.target===document.getElementById('cart-overlay'))closeCartBtn()}
function closeCartBtn(){document.getElementById('cart-overlay').classList.remove('open')}
function renderCart(){
  const items=Object.values(cart).filter(x=>x.qty>0);
  const el=document.getElementById('cart-content');
  if(!items.length){el.innerHTML=`<div class="cart-empty">🛒<br>${t('empty')}</div>`;return}
  const total=items.reduce((s,x)=>s+x.product.price*x.qty,0);
  el.innerHTML=items.map(x=>`<div class="cart-item"><div class="ci-info"><div class="ci-name">${x.product.name}</div><div class="ci-sub">${fmtPrice(x.product.price)} ${t('somoni')} × ${x.qty}</div></div><div class="ci-qty"><button class="ci-qty-btn" onclick="cqChange('${x.product.id}',-1)">−</button><span class="ci-qty-num">${x.qty}</span><button class="ci-qty-btn" onclick="cqChange('${x.product.id}',1)">+</button></div><div class="ci-total">${fmtPrice(x.product.price*x.qty)}</div><button class="ci-remove" onclick="removeItem('${x.product.id}')">🗑</button></div>`).join('')+`<div class="cart-summary"><div class="cart-total">${t('total')} <span>${fmtPrice(total)} ${t('somoni')}</span></div><button class="primary-btn" onclick="openOrderForm()">${t('checkout')}</button></div>`;
}
function cqChange(id,d){if(!cart[id])return;cart[id].qty=Math.max(0,cart[id].qty+d);if(cart[id].qty===0)delete cart[id];updateCartCount();renderCart();renderProducts()}
function removeItem(id){delete cart[id];updateCartCount();renderCart();renderProducts()}

function openOrderForm(){closeCartBtn();setTimeout(()=>document.getElementById('form-overlay').classList.add('open'),100)}
function closeForm(e){if(e.target===document.getElementById('form-overlay'))closeFormBtn()}
function closeFormBtn(){document.getElementById('form-overlay').classList.remove('open')}

function submitOrder(){
  const name=document.getElementById('buyer-name').value.trim();
  const phone=document.getElementById('buyer-phone').value.trim();
  if(!name||!phone){alert('Заполните имя и телефон');return}
  const items=Object.values(cart).filter(x=>x.qty>0);
  const total=items.reduce((s,x)=>s+x.product.price*x.qty,0);
  let txt=`🛒 НОВЫЙ ЗАКАЗ\n👤 ${name}\n📞 ${phone}\n\n`;
  items.forEach(x=>{txt+=`• ${x.product.name}\n  ${x.qty} шт × ${fmtPrice(x.product.price)} сом = ${fmtPrice(x.product.price*x.qty)} сом\n`});
  txt+=`\n💰 ИТОГО: ${fmtPrice(total)} сом`;
  const comment=document.getElementById('buyer-comment').value.trim();
  if(comment)txt+=`\n💬 ${comment}`;
  if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.sendData)Telegram.WebApp.sendData(JSON.stringify({buyer:name,phone,comment,items:items.map(x=>({id:x.product.id,name:x.product.name,qty:x.qty,price:x.product.price})),total:total.toFixed(2),text:txt}));
  closeFormBtn();cart={};updateCartCount();renderProducts();
  document.getElementById('success-overlay').classList.add('open');
}
function closeSuccess(){document.getElementById('success-overlay').classList.remove('open')}

if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand()}
renderCats();renderProducts();
</script>
</body>
</html>
