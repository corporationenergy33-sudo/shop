<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Оптовый каталог / Каталоги яклухт</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2530;
    --border: #2a3140;
    --accent: #f0a500;
    --accent2: #e8850a;
    --text: #f0f4ff;
    --text2: #8a96a8;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; overscroll-behavior: none; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .cart-btn { background: var(--accent); color: #000; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .15s; }
  .cart-btn:active { opacity: 0.8; }
  .cart-count { background: #000; color: var(--accent); border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 700; }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 36px; color: var(--text); font-size: 13px; outline: none; }
  .search-input::placeholder { color: var(--text2); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 14px; pointer-events: none; }

  /* CATEGORIES */
  .cats { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text2); white-space: nowrap; cursor: pointer; transition: all .15s; flex-shrink: 0; }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* PRODUCT GRID */
  .products { padding: 4px 12px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-img {
    width: 100%;
    height: 140px;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 8px;
    background: #f5f5f5;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: border-color .15s; position: relative; }
  .card:active { border-color: var(--accent); }
  .card-cat { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card-name { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; color: var(--text); }
  .card-spec { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .card-price { font-size: 16px; font-weight: 700; color: var(--accent); }
  .card-price span { font-size: 11px; color: var(--text2); font-weight: 400; }
  .card-qty { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .add-btn { position: absolute; bottom: 10px; right: 10px; background: var(--accent); border: none; border-radius: 8px; width: 28px; height: 28px; font-size: 16px; color: #000; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s; }
  .add-btn:active { opacity: 0.8; }
  .in-cart-badge { position: absolute; top: 8px; right: 8px; background: var(--green); color: #fff; border-radius: 10px; padding: 2px 7px; font-size: 10px; font-weight: 700; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* MODAL OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
  .overlay.open { display: flex; }

  /* PRODUCT DETAIL */
  .detail-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .detail-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .detail-id { font-size: 11px; color: var(--text2); margin-bottom: 12px; }
  .detail-spec-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-spec-row:last-child { border-bottom: none; }
  .detail-spec-label { color: var(--text2); }
  .detail-price-big { font-size: 28px; font-weight: 800; color: var(--accent); margin: 16px 0 4px; }
  .qty-control { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .qty-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; font-size: 20px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 64px; height: 36px; text-align: center; color: var(--text); font-size: 16px; font-weight: 600; outline: none; }
  .add-to-cart-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; color: #000; cursor: pointer; margin-top: 4px; }
  .add-to-cart-btn:active { opacity: 0.85; }
  .close-btn { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: none; border-radius: 20px; width: 28px; height: 28px; color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* CART SHEET */
  .cart-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .cart-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .cart-item-total { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .cart-remove { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px; }
  .cart-item-qty { display: flex; align-items: center; gap: 6px; }
  .cart-item-qty-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; font-size: 14px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cart-item-qty-num { font-size: 14px; font-weight: 600; min-width: 24px; text-align: center; }
  .cart-summary { padding: 16px 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .cart-total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .cart-total-row span { color: var(--accent); font-size: 20px; }
  .checkout-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; color: #000; cursor: pointer; }
  .cart-empty { text-align: center; padding: 40px 0; color: var(--text2); }

  /* ORDER FORM */
  .form-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .form-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .form-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; }
  .form-input:focus { border-color: var(--accent); }
  .send-btn { width: 100%; background: var(--green); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; margin-top: 8px; }
  .send-btn:active { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* SUCCESS */
  .success-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 40px 20px; width: 100%; text-align: center; }
  .success-icon { font-size: 56px; margin-bottom: 12px; }
  .success-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 24px; }
  .success-close-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 32px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }

  /* BADGE COUNTER */
  .badge { display: inline-block; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 5px; font-size: 10px; font-weight: 700; vertical-align: super; margin-left: 2px; }

  /* TAJ LANG TOGGLE */
  .lang-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; color: var(--text2); font-size: 11px; cursor: pointer; }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo" id="logo-text">🛍 Оптовый каталог</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="lang-btn active" id="lang-ru" onclick="setLang('ru')">РУС</button>
      <button class="lang-btn" id="lang-tj" onclick="setLang('tj')">ТОҶ</button>
      <button class="cart-btn" onclick="openCart()">
        🛒 <span id="cart-label">Корзина</span>
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Поиск товара..." oninput="renderProducts()" autocomplete="off">
  </div>
</div>

<!-- CATEGORIES -->
<div class="cats" id="cats"></div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- PRODUCT DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <button class="close-btn" onclick="closeDetailBtn()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- CART OVERLAY -->
<div class="overlay" id="cart-overlay" onclick="closeCart(event)">
  <div class="cart-sheet" id="cart-sheet">
    <div class="sheet-handle"></div>
    <button class="close-btn" onclick="closeCartBtn()">✕</button>
    <div class="cart-title" id="cart-title-text">🛒 Корзина</div>
    <div id="cart-content"></div>
  </div>
</div>

<!-- ORDER FORM OVERLAY -->
<div class="overlay" id="form-overlay" onclick="closeForm(event)">
  <div class="form-sheet" id="form-sheet">
    <div class="sheet-handle"></div>
    <button class="close-btn" onclick="closeFormBtn()">✕</button>
    <div class="form-title" id="form-title-text">📋 Оформить заказ</div>
    <div class="form-sub" id="form-sub-text">Заполните данные — мы свяжемся с вами</div>
    <label class="form-label" id="label-name">Ваше имя / Магазин</label>
    <input class="form-input" id="buyer-name" placeholder="Имя или название магазина">
    <label class="form-label" id="label-phone">Телефон / WhatsApp</label>
    <input class="form-input" id="buyer-phone" placeholder="+992..." type="tel">
    <label class="form-label" id="label-comment">Комментарий (необязательно)</label>
    <input class="form-input" id="buyer-comment" placeholder="Уточнения к заказу">
    <button class="send-btn" id="send-btn" onclick="submitOrder()">✅ Отправить заказ</button>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="overlay" id="success-overlay">
  <div class="success-sheet">
    <div class="success-icon">✅</div>
    <div class="success-title" id="success-title">Заказ отправлен!</div>
    <div class="success-sub" id="success-sub">Мы получили ваш заказ и свяжемся с вами в ближайшее время.</div>
    <button class="success-close-btn" onclick="closeSuccess()">Закрыть</button>
  </div>
</div>

}
function updateTexts() {
  document.getElementById('logo-text').textContent = t('logo');
  document.getElementById('cart-label').textContent = t('cart');
  document.getElementById('search').placeholder = t('search');
  document.getElementById('cart-title-text').textContent = t('cartTitle');
  document.getElementById('form-title-text').textContent = t('formTitle');
  document.getElementById('form-sub-text').textContent = t('formSub');
  document.getElementById('label-name').textContent = t('labelName');
  document.getElementById('label-phone').textContent = t('labelPhone');
  document.getElementById('label-comment').textContent = t('labelComment');
  document.getElementById('buyer-name').placeholder = t('namePh');
  document.getElementById('buyer-phone').placeholder = t('phonePh');
  document.getElementById('buyer-comment').placeholder = t('commentPh');
  document.getElementById('send-btn').textContent = t('sendBtn');
  document.getElementById('success-title').textContent = t('successTitle');
  document.getElementById('success-sub').textContent = t('successSub');
}

// ============================================================
// STATE
// ============================================================
let activeCat = 'all';
let cart = {}; // id -> {product, qty}

function getCategories() {
  const cats = [...new Set(PRODUCTS.map(p => p.cat))].sort();
  return cats;
}

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  return PRODUCTS.filter(p => {
    const matchCat = activeCat === 'all' || p.cat === activeCat;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

// ============================================================
// RENDER CATEGORIES
// ============================================================
function renderCats() {
  const cats = getCategories();
  const el = document.getElementById('cats');
  const allBtn = `<button class="cat-btn ${activeCat === 'all' ? 'active' : ''}" onclick="selectCat('all')">${t('all')} (${PRODUCTS.length})</button>`;
  const btns = cats.map(c => {
    const count = PRODUCTS.filter(p => p.cat === c).length;
    return `<button class="cat-btn ${activeCat === c ? 'active' : ''}" onclick="selectCat('${c}')">${c} (${count})</button>`;
  }).join('');
  el.innerHTML = allBtn + btns;
}

function selectCat(cat) {
  activeCat = cat;
  renderCats();
  renderProducts();
}

// ============================================================
// RENDER PRODUCTS
// ============================================================
function renderProducts() {
  const filtered = getFiltered();
  const el = document.getElementById('products');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>${t('emptySearch')}</div><div style="font-size:12px;margin-top:4px">${t('emptyHint')}</div></div>`;
    return;
  }
  el.innerHTML = filtered.map(p => {
    const inCart = cart[p.id] ? cart[p.id].qty : 0;
    return `
    <div class="card" onclick="openDetail('${p.id}')">
      ${inCart ? `<div class="in-cart-badge">${inCart}</div>` : ''}
      ${p.img ? `<div class="card-img"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : ''}
      <div class="card-cat">${p.cat}</div>
      <div class="card-name">${p.name}</div>
      ${p.spec ? `<div class="card-spec">${p.spec}</div>` : ''}
      <div class="card-price">${p.price.toFixed(1)} <span>сом</span></div>
      <div class="card-qty">${t('stock')} ${p.qty} ${t('pcs')}</div>
      <button class="add-btn" onclick="quickAdd(event,'${p.id}')">+</button>
    </div>`;
  }).join('');
}

function quickAdd(e, id) {
  e.stopPropagation();
  const p = PRODUCTS.find(x => x.id === id);
  if (!cart[id]) cart[id] = { product: p, qty: 0 };
  cart[id].qty++;
  updateCartCount();
  renderProducts();
  if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('light');
}

// ============================================================
// DETAIL SHEET
// ============================================================
let detailQty = 1;
let detailId = null;

function openDetail(id) {
  const p = PRODUCTS.find(x => x.id === id);
  detailId = id;
  detailQty = cart[id] ? cart[id].qty : 1;
  const html = `
    ${p.img ? `<div style="width:100%;height:200px;overflow:hidden;border-radius:12px;margin-bottom:12px;background:#f5f5f5"><img src="${p.img}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>` : ''}
    <div class="detail-name">${p.name}</div>
    <div class="detail-id">${t('art')} ${p.id}</div>
    <div class="detail-spec-row"><span class="detail-spec-label">${t('priceLabel')}</span><span style="color:var(--accent);font-weight:700">${p.price.toFixed(2)} сом</span></div>
    ${p.spec ? `<div class="detail-spec-row"><span class="detail-spec-label">${t('inPack')}</span><span>${p.spec}</span></div>` : ''}
    <div class="detail-spec-row"><span class="detail-spec-label">${t('stock')}</span><span>${p.qty} ${t('pcs')}</span></div>
    <div class="detail-price-big">${p.price.toFixed(1)} <span style="font-size:16px;font-weight:400;color:var(--text2)">сом</span></div>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeDetailQty(-1)">−</button>
      <input class="qty-input" id="detail-qty-input" type="number" value="${detailQty}" min="1" oninput="detailQtyInput(this.value)">
      <button class="qty-btn" onclick="changeDetailQty(1)">+</button>
      <span style="color:var(--text2);font-size:12px">= ${(p.price * detailQty).toFixed(1)} сом</span>
    </div>
    <button class="add-to-cart-btn" onclick="addToCartFromDetail()">${t('addToCart')}</button>
  `;
  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-overlay').classList.add('open');
}

function changeDetailQty(delta) {
  detailQty = Math.max(1, detailQty + delta);
  document.getElementById('detail-qty-input').value = detailQty;
  refreshDetailTotal();
}
function detailQtyInput(v) {
  detailQty = Math.max(1, parseInt(v) || 1);
  refreshDetailTotal();
}
function refreshDetailTotal() {
  const p = PRODUCTS.find(x => x.id === detailId);
  const span = document.querySelector('.qty-control span');
  if (span) span.textContent = `= ${(p.price * detailQty).toFixed(1)} сом`;
}
function addToCartFromDetail() {
  const p = PRODUCTS.find(x => x.id === detailId);
  cart[detailId] = { product: p, qty: detailQty };
  updateCartCount();
  renderProducts();
  closeDetailBtn();
  if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
}
function closeDetail(e) { if (e.target === document.getElementById('detail-overlay')) closeDetailBtn(); }
function closeDetailBtn() { document.getElementById('detail-overlay').classList.remove('open'); }

// ============================================================
// CART
// ============================================================
function updateCartCount() {
  const total = Object.values(cart).reduce((s, x) => s + x.qty, 0);
  document.getElementById('cart-count').textContent = total;
}

function openCart() {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
}
function closeCart(e) { if (e.target === document.getElementById('cart-overlay')) closeCartBtn(); }
function closeCartBtn() { document.getElementById('cart-overlay').classList.remove('open'); }

function renderCart() {
  const items = Object.values(cart).filter(x => x.qty > 0);
  const el = document.getElementById('cart-content');
  if (!items.length) {
    el.innerHTML = `<div class="cart-empty">🛒<br>${t('cartEmpty')}</div>`;
    return;
  }
  const total = items.reduce((s, x) => s + x.product.price * x.qty, 0);
  const rows = items.map(x => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${x.product.name}</div>
        <div class="cart-item-sub">${x.product.price.toFixed(1)} сом × ${x.qty}</div>
      </div>
      <div class="cart-item-qty">
        <button class="cart-item-qty-btn" onclick="cartQtyChange('${x.product.id}',-1)">−</button>
        <span class="cart-item-qty-num">${x.qty}</span>
        <button class="cart-item-qty-btn" onclick="cartQtyChange('${x.product.id}',1)">+</button>
      </div>
      <div class="cart-item-total">${(x.product.price * x.qty).toFixed(1)}</div>
      <button class="cart-remove" onclick="removeFromCart('${x.product.id}')">🗑</button>
    </div>`).join('');
  el.innerHTML = rows + `
    <div class="cart-summary">
      <div class="cart-total-row">${t('total')} <span>${total.toFixed(1)} сом</span></div>
      <button class="checkout-btn" onclick="openOrderForm()">${t('checkout')}</button>
    </div>`;
}

function cartQtyChange(id, delta) {
  if (!cart[id]) return;
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if (cart[id].qty === 0) delete cart[id];
  updateCartCount();
  renderCart();
  renderProducts();
}
function removeFromCart(id) {
  delete cart[id];
  updateCartCount();
  renderCart();
  renderProducts();
}

// ============================================================
// ORDER FORM
// ============================================================
function openOrderForm() {
  closeCartBtn();
  setTimeout(() => document.getElementById('form-overlay').classList.add('open'), 100);
}
function closeForm(e) { if (e.target === document.getElementById('form-overlay')) closeFormBtn(); }
function closeFormBtn() { document.getElementById('form-overlay').classList.remove('open'); }

function submitOrder() {
  const name = document.getElementById('buyer-name').value.trim();
  const phone = document.getElementById('buyer-phone').value.trim();
  if (!name || !phone) {
    alert(lang === 'ru' ? 'Заполните имя и телефон' : 'Ном ва телефонро пур кунед');
    return;
  }

  const items = Object.values(cart).filter(x => x.qty > 0);
  const total = items.reduce((s, x) => s + x.product.price * x.qty, 0);

  let orderText = `🛒 НОВЫЙ ЗАКАЗ\n`;
  orderText += `👤 ${name}\n📞 ${phone}\n\n`;
  orderText += `📦 ТОВАРЫ:\n`;
  items.forEach(x => {
    orderText += `• ${x.product.name} (${x.product.id})\n  ${x.qty} шт × ${x.product.price.toFixed(1)} сом = ${(x.product.price * x.qty).toFixed(1)} сом\n`;
  });
  orderText += `\n💰 ИТОГО: ${total.toFixed(1)} сом`;
  const comment = document.getElementById('buyer-comment').value.trim();
  if (comment) orderText += `\n💬 ${comment}`;

  // Telegram WebApp sendData
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.sendData) {
    Telegram.WebApp.sendData(JSON.stringify({
      buyer: name,
      phone,
      comment,
      items: items.map(x => ({ id: x.product.id, name: x.product.name, qty: x.qty, price: x.product.price })),
      total: total.toFixed(2),
      text: orderText
    }));
  }

  closeFormBtn();
  cart = {};
  updateCartCount();
  renderProducts();
  document.getElementById('success-overlay').classList.add('open');
}

function closeSuccess() {
  document.getElementById('success-overlay').classList.remove('open');
}

// ============================================================
// INIT
// ============================================================
function init() {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
  renderCats();
  renderProducts();
}

init();
</script>
</body>
</html>
